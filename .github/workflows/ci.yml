name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable corepack
        run: corepack enable

      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile

      - run: make check-front
      - run: make coverage
      - run: make build

  backend:
    name: backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: hookdiff
          POSTGRES_USER: hookdiff
          POSTGRES_PASSWORD: hookdiff
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_DB: hookdiff
      POSTGRES_USER: hookdiff
      POSTGRES_PASSWORD: hookdiff
      POSTGRES_HOST: localhost
      DATABASE_URL: postgres://hookdiff:hookdiff@localhost:5432/hookdiff
      REDIS_URL: redis://localhost:6379/0
      DJANGO_SECRET_KEY: ci-test-key
      DJANGO_DEBUG: '1'
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install backend dependencies
        run: cd backend && uv sync

      - run: make check-back
      - run: make coverage-back
