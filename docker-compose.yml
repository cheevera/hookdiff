services:
  app:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    ports:
      - '5173:5173'
      - '8000:8000'
    environment:
      POSTGRES_DB: hookdiff
      POSTGRES_USER: hookdiff
      POSTGRES_PASSWORD: hookdiff
      DATABASE_URL: postgres://hookdiff:hookdiff@postgres:5432/hookdiff
      REDIS_URL: redis://redis:6379/0
      DJANGO_SECRET_KEY: dev-insecure-key-do-not-use-in-production
      DJANGO_DEBUG: '1'
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hookdiff
      POSTGRES_USER: hookdiff
      POSTGRES_PASSWORD: hookdiff
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

volumes:
  pgdata:
