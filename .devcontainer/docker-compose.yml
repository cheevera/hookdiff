services:
  frontend:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    command: sleep infinity
    volumes:
      - ../:/workspaces/hookdiff:cached
      - devcontainer_node_modules:/workspaces/hookdiff/frontend/node_modules
    working_dir: /workspaces/hookdiff
    ports:
      - '5173:5173'

volumes:
  devcontainer_node_modules:
